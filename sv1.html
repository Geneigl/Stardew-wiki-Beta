<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki de Items - Onjetos</title>
    <link rel="stylesheet" href="svo.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

     <div class="logo-container">
        <img src="logosv.png" class="logo-claro" alt="Stardew Valley Logo">
        <img src="logosv2.png" class="logo-oscuro" alt="Stardew Valley Logo Iridio">
    </div>

    <h2>Wiki de Items</h2>
    
    <a href="index.html" class="regresar">
        <img src="1.png" class="icono" alt="Regresar">
    </a>

    <button class="modo-oscuro" onclick="toggleDarkMode()" title="Cambiar modo">
        <img src="svoscuro.png" class="icono" alt="Modo">
    </button>
    
    <div class="buscador-container">
        <input type="text" id="filtro" placeholder=" Buscar por nombre o ID..." oninput="filtrar()">
        
        <div class="categorias-grid">
            <button class="btn-cat" onclick="filtrarPorClase('Todos')">Todos</button>
            <button class="btn-cat" onclick="filtrarPorClase('Anillo')">Anillos</button>
            <button class="btn-cat" onclick="filtrarPorClase('Artefacto')">Artefactos</button>
            <button class="btn-cat" onclick="filtrarPorClase('Cocina')">Cocina</button>
            <button class="btn-cat" onclick="filtrarPorClase('Fabricable')">Fabricables</button>
            <button class="btn-cat" onclick="filtrarPorClase('Mineral')">Minerales</button>
            <button class="btn-cat" onclick="filtrarPorClase('Mision')">Misiones</button>
            <button class="btn-cat" onclick="filtrarPorClase('Nodo')">Nodos</button>
            <button class="btn-cat" onclick="filtrarPorClase('Basico')">Objetos Básicos</button>
            <button class="btn-cat" onclick="filtrarPorClase('Pescado')">Pescados</button>
            <button class="btn-cat" onclick="filtrarPorClase('Semilla')">Semillas</button>
            <button class="btn-cat" onclick="filtrarPorClase('Misc')">Misc</button>
        </div>
    </div>
    
    <ul id="listaVisual"></ul>

    <script src="sv1.js"></script>
</body>
</html>
